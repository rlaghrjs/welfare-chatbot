services:
  postgres:
    image: postgres:16
    container_name: welfare-postgres
    restart: always
    environment:
      POSTGRES_DB: welfare_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - welfare_postgres_data:/var/lib/postgresql/data

volumes:
  welfare_postgres_data:
